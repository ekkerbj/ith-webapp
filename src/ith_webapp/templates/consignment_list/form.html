{% extends "base.html" %}

{% block title %}Consignment Item - ITH{% endblock %}

{% block content %}
<h1>Consignment Item</h1>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="customer_id">Customer ID</label>
    <input type="number" id="customer_id" name="customer_id" value="{{ item.customer_id if item else '' }}" required>

    <label for="part_id">Part ID</label>
    <input type="number" id="part_id" name="part_id" value="{{ item.part_id if item else '' }}" required>

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" name="quantity" value="{{ item.quantity if item else '' }}" required>

    <button type="submit">Save</button>
</form>

<a href="{{ url_for('consignment_list.consignment_list') }}">Back to list</a>
{% endblock %}
