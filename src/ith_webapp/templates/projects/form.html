{% extends "base.html" %}

{% block title %}{{ "Edit" if item else "New" }} Project - ITH{% endblock %}

{% block content %}
<section class="hero-panel">
    <p class="eyebrow">Project form</p>
    <h1>{{ "Edit project" if item else "New project" }}</h1>
    <p>Start a project record for a customer.</p>
</section>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="customer_id">Customer ID</label>
    <input type="number" id="customer_id" name="customer_id" value="{{ item.customer_id if item else '' }}" required>

    <label for="cardcode">Card Code</label>
    <input type="text" id="cardcode" name="cardcode" value="{{ item.cardcode if item else '' }}">

    <label for="project_name">Project Name</label>
    <input type="text" id="project_name" name="project_name" value="{{ item.project_name if item else '' }}">

    <label for="active">Active</label>
    <input type="checkbox" id="active" name="active" {{ 'checked' if item and item.active else '' }}>

    <div class="hero-panel__actions">
        <button type="submit">Save</button>
        <a class="button-secondary" href="{{ url_for('projects.project_list') }}">Back to projects</a>
    </div>
</form>
{% endblock %}
